<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SafePass - Admin</title>
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #e8f8f6;
      color: #050d1a;
      min-height: 100vh;
      padding: 20px 20px 100px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(0,184,160,0.2);
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-left i { font-size: 1.6rem; color: #00b8a0; }
    .logo { font-size: 1.3rem; font-weight: 700; letter-spacing: 2px; }
    .badge-admin {
      background: rgba(0,184,160,0.1);
      border: 1px solid rgba(0,184,160,0.3);
      color: #00b8a0;
      font-size: 0.7rem;
      padding: 4px 12px;
      border-radius: 20px;
      letter-spacing: 1px;
    }
    .btn-volver {
      background: transparent;
      border: 1px solid rgba(0,184,160,0.3);
      color: #00b8a0;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.8rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .sec-titulo {
      font-size: 0.72rem;
      color: #7a9aaa;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .zonas-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .zona-card {
      background: white;
      border: 1px solid rgba(0,184,160,0.2);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 2px 10px rgba(0,184,160,0.08);
    }
    .zona-nombre { font-size: 1rem; font-weight: 700; margin-bottom: 4px; }
    .zona-edificio { font-size: 0.8rem; color: #7a9aaa; margin-bottom: 16px; }
    .qr-wrapper {
      display: flex;
      justify-content: center;
      margin-bottom: 14px;
      background: white;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(0,184,160,0.15);
    }
    .btn-descargar {
      width: 100%;
      padding: 10px;
      background: linear-gradient(135deg, #00c8b0, #00e676);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn-descargar:hover { opacity: 0.9; }
    .zona-url {
      font-size: 0.7rem;
      color: #7a9aaa;
      text-align: center;
      margin-top: 8px;
      word-break: break-all;
    }

    /* Usuarios */
    .usuario-card {
      background: white;
      border: 1px solid rgba(0,184,160,0.2);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .usuario-nombre { font-size: 0.95rem; font-weight: 600; }
    .usuario-sub { font-size: 0.75rem; color: #7a9aaa; margin-top: 2px; }
    .badge-rol {
      font-size: 0.65rem;
      padding: 3px 10px;
      border-radius: 20px;
      background: rgba(0,184,160,0.1);
      color: #00b8a0;
      border: 1px solid rgba(0,184,160,0.2);
    }

    /* Form nuevo usuario */
    .form-card {
      background: white;
      border: 1px solid rgba(0,184,160,0.2);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 24px;
      box-shadow: 0 2px 10px rgba(0,184,160,0.08);
    }
    .form-titulo { font-size: 0.9rem; font-weight: 700; margin-bottom: 16px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-label { font-size: 0.7rem; color: #7a9aaa; letter-spacing: 1px; text-transform: uppercase; }
    .form-input, .form-select {
      padding: 10px 12px;
      border: 1px solid rgba(0,184,160,0.2);
      border-radius: 10px;
      font-size: 0.88rem;
      color: #050d1a;
      background: #f0fffe;
      outline: none;
      font-family: 'Segoe UI', sans-serif;
    }
    .form-input:focus { border-color: #00b8a0; }
    .btn-agregar {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #00c8b0, #00e676);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 1px;
    }

    body.dark {
  background: #020f1a;
  color: white;
}
body.dark .zona-card,
body.dark .form-card,
body.dark .usuario-card {
  background: #031a2e;
  border-color: rgba(0,230,200,0.2);
  color: white;
}
body.dark .zona-edificio,
body.dark .usuario-sub,
body.dark .zona-url,
body.dark .form-label { color: rgba(255,255,255,0.4); }
body.dark .form-input,
body.dark .form-select {
  background: #042030;
  border-color: rgba(0,230,200,0.2);
  color: white;
}
body.dark .header { border-bottom-color: rgba(0,230,200,0.2); }
body.dark .sec-titulo { color: rgba(0,230,200,0.6); }
body.dark .qr-wrapper { background: white; }

.modal-overlay {
  display: none;
}
.modal-overlay.visible {
  display: flex;
}
  </style>
</head>
<body>

  <div class="header">
  <div class="header-left">
    <i class='bx bx-shield-alt-2'></i>
    <div class="logo">ADMIN</div>
    <span class="badge-admin">SAFEPASS</span>
  </div>
  <div style="display:flex; gap:10px; align-items:center;">

    <button class="btn-volver" onclick="window.location.href='/clinica.html'" style="padding:8px 18px; font-size:0.82rem;">
      <i class='bx bx-arrow-back'></i> Volver al panel
    </button>
  </div>
</div>

  <!-- QR por zona -->
  <div class="sec-titulo">Códigos QR por zona</div>
  <div class="zonas-grid" id="zonas-grid"></div>

  <!-- Usuarios -->
  <div class="sec-titulo">Usuarios del sistema</div>

  <div class="form-card">
    <div class="form-titulo">Agregar nuevo usuario</div>
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Nombre</label>
        <input class="form-input" id="new-nombre" type="text" placeholder="Nombre completo">
      </div>
      <div class="form-group">
        <label class="form-label">Correo</label>
        <input class="form-input" id="new-correo" type="email" placeholder="correo@itca.edu.sv">
      </div>
      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <input class="form-input" id="new-password" type="password" placeholder="••••••••">
      </div>
      <div class="form-group">
        <label class="form-label">Rol</label>
        <select class="form-select" id="new-rol">
          <option value="clinica">Clínica</option>
          <option value="admin">Admin</option>
        </select>
      </div>
    </div>
    <button class="btn-agregar" onclick="agregarUsuario()">
      <i class='bx bx-user-plus'></i> AGREGAR USUARIO
    </button>
  </div>

  <div id="lista-usuarios"></div>

  <script>
    const BASE_URL = window.location.origin;

    async function cargarZonas() {
      const res = await fetch('/api/zonas');
      const zonas = await res.json();
      const grid = document.getElementById('zonas-grid');
      grid.innerHTML = '';

      zonas.forEach(zona => {
        const url = `${BASE_URL}?zona=${zona.id_zona}`;
        const card = document.createElement('div');
        card.className = 'zona-card';
        card.innerHTML = `
          <div class="zona-nombre">${zona.nombre_zona}</div>
          <div class="zona-edificio"><i class='bx bx-building'></i> ${zona.edificio}</div>
          <div class="qr-wrapper" id="qr-${zona.id_zona}"></div>
          <button class="btn-descargar" onclick="descargarQR(${zona.id_zona}, '${zona.nombre_zona}')">
            <i class='bx bx-download'></i> DESCARGAR QR
          </button>
          <div class="zona-url">${url}</div>
        `;
        grid.appendChild(card);

        // Generar QR
        new QRCode(document.getElementById(`qr-${zona.id_zona}`), {
          text: url,
          width: 180,
          height: 180,
          colorDark: '#020f1a',
          colorLight: '#ffffff',
          correctLevel: QRCode.CorrectLevel.H
        });
      });
    }

    function descargarQR(idZona, nombreZona) {
      const qrWrapper = document.getElementById(`qr-${idZona}`);
      const canvas = qrWrapper.querySelector('canvas');
      if (!canvas) {
        alert('QR no generado aún, esperá un momento');
        return;
      }

      // Crear canvas final con etiqueta
      const final = document.createElement('canvas');
      final.width = 260;
      final.height = 320;
      const ctx = final.getContext('2d');

      // Fondo blanco
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, 260, 320);

      // Header verde
      ctx.fillStyle = '#00b8a0';
      ctx.fillRect(0, 0, 260, 50);

      // Texto SAFEPASS
      ctx.fillStyle = 'white';
      ctx.font = 'bold 18px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('SAFEPASS', 130, 25);

      // Subtítulo
      ctx.font = '10px Arial';
      ctx.fillText('ITCA-FEPADE · SANTA TECLA', 130, 42);

      // QR centrado
      ctx.drawImage(canvas, 40, 180, 180, 180);

      // Nombre zona
      ctx.fillStyle = '#050d1a';
      ctx.font = 'bold 14px Arial';
      ctx.fillText(nombreZona, 130, 265);

      // Instrucción
      ctx.fillStyle = '#7a9aaa';
      ctx.font = '11px Arial';
      ctx.fillText('Escaneá para reportar emergencia', 130, 285);

      // Footer
      ctx.fillStyle = '#00b8a0';
      ctx.fillRect(0, 300, 260, 20);
      ctx.fillStyle = 'white';
      ctx.font = '9px Arial';
      ctx.fillText('Sistema de Respuesta de Emergencias', 130, 313);

      // Descargar
      const link = document.createElement('a');
      link.download = `QR_SafePass_${nombreZona.replace(/\s/g, '_')}.png`;
      link.href = final.toDataURL('image/png');
      link.click();
    }

    async function cargarUsuarios() {
  const res = await fetch('/api/usuarios/todos');
  if (!res.ok) return;
  const usuarios = await res.json();
  document.getElementById('lista-usuarios').innerHTML = usuarios.map(u => `
    <div class="usuario-card">
      <div>
        <div class="usuario-nombre">${u.nombre}</div>
        <div class="usuario-sub">${u.correo}</div>
      </div>
      <div style="display:flex; align-items:center; gap:8px;">
        <span class="badge-rol">${u.rol}</span>
        <button onclick="editarUsuario(${u.id_usuario}, '${u.nombre}', '${u.correo}', '${u.rol}')" 
          style="background:transparent; border:1px solid rgba(0,184,160,0.3); color:#00b8a0; padding:6px 10px; border-radius:8px; font-size:0.75rem; cursor:pointer;">
          <i class='bx bx-edit'></i>
        </button>
        <button onclick="eliminarUsuario(${u.id_usuario}, '${u.nombre}')"
          style="background:transparent; border:1px solid rgba(255,77,77,0.3); color:#ff4d4d; padding:6px 10px; border-radius:8px; font-size:0.75rem; cursor:pointer;">
          <i class='bx bx-trash'></i>
        </button>
      </div>
    </div>
  `).join('');
}

async function eliminarUsuario(id, nombre) {
  if (!confirm(`¿Seguro que quieress eliminar a ${nombre}?`)) return;
  await fetch(`/api/usuarios/${id}`, { method: 'DELETE' });
  await cargarUsuarios();
}

function editarUsuario(id, nombre, correo, rol) {
  document.getElementById('edit-id').value = id;
  document.getElementById('edit-nombre').value = nombre;
  document.getElementById('edit-correo').value = correo;
  document.getElementById('edit-rol').value = rol;
  document.getElementById('edit-password').value = '';
  document.getElementById('modal-editar').classList.add('visible');
}

async function guardarEdicion() {
  const id = document.getElementById('edit-id').value;
  const nombre = document.getElementById('edit-nombre').value.trim();
  const correo = document.getElementById('edit-correo').value.trim();
  const password = document.getElementById('edit-password').value.trim();
  const rol = document.getElementById('edit-rol').value;

  if (!nombre || !correo) {
    alert('Completá nombre y correo');
    return;
  }

  await fetch(`/api/usuarios/${id}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ nombre, correo, password, rol })
  });

  document.getElementById('modal-editar').classList.remove('visible');
  await cargarUsuarios();
}

    async function agregarUsuario() {
      const nombre = document.getElementById('new-nombre').value.trim();
      const correo = document.getElementById('new-correo').value.trim();
      const password = document.getElementById('new-password').value.trim();
      const rol = document.getElementById('new-rol').value;

      if (!nombre || !correo || !password) {
        alert('Por favor completá todos los campos');
        return;
      }

      const res = await fetch('/api/usuarios', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nombre, correo, password, rol })
      });

      if (res.ok) {
        document.getElementById('new-nombre').value = '';
        document.getElementById('new-correo').value = '';
        document.getElementById('new-password').value = '';
        await cargarUsuarios();
        alert('Usuario agregado correctamente');
      } else {
        alert('Error al agregar usuario');
      }
    }

    cargarZonas();
    cargarUsuarios();
    
  </script>

<!-- Modal editar usuario -->
<div class="modal-overlay" id="modal-editar" style="position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); z-index:200; align-items:flex-end; justify-content:center;">
  <div style="background:white; border-radius:24px 24px 0 0; padding:24px 20px 40px; width:100%; max-width:500px;">
    <div style="font-size:1.1rem; font-weight:700; margin-bottom:4px;">Editar Usuario</div>
    <div style="font-size:0.8rem; color:#7a9aaa; margin-bottom:20px;">Modificá los datos del usuario</div>
    <input type="hidden" id="edit-id">
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Nombre</label>
        <input class="form-input" id="edit-nombre" type="text">
      </div>
      <div class="form-group">
        <label class="form-label">Correo</label>
        <input class="form-input" id="edit-correo" type="email">
      </div>
      <div class="form-group">
        <label class="form-label">Nueva contraseña (opcional)</label>
        <input class="form-input" id="edit-password" type="password" placeholder="Dejar vacío para no cambiar">
      </div>
      <div class="form-group">
        <label class="form-label">Rol</label>
        <select class="form-select" id="edit-rol">
          <option value="clinica">Clínica</option>
          <option value="admin">Admin</option>
        </select>
      </div>
    </div>
    <button class="btn-agregar" onclick="guardarEdicion()" style="margin-bottom:8px;">GUARDAR CAMBIOS</button>
    <button onclick="document.getElementById('modal-editar').classList.remove('visible')" 
      style="width:100%; padding:12px; background:transparent; color:#7a9aaa; border:1px solid rgba(0,0,0,0.1); border-radius:14px; font-size:0.85rem; cursor:pointer;">
      Cancelar
    </button>
  </div>
</div>

</body>
</html>
