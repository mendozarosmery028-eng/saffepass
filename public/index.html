<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>SafePass - ITCA</title>
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #012c2e;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 40px 24px 32px;
      overflow: hidden;
      position: relative;
    }

    .bg-waves {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      opacity: 0.4;
    }

    .wave {
      position: absolute;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      border-radius: 40%;
      animation: waveRotate 12s linear infinite;
    }
    .wave:nth-child(1) {
      background: radial-gradient(ellipse, transparent 55%, rgba(0,230,200,0.08) 70%, transparent 80%);
      animation-duration: 10s;
    }
    .wave:nth-child(2) {
      background: radial-gradient(ellipse, transparent 50%, rgba(0,200,255,0.06) 65%, transparent 75%);
      animation-duration: 14s;
      animation-direction: reverse;
    }
    .wave:nth-child(3) {
      background: radial-gradient(ellipse, transparent 60%, rgba(0,255,150,0.05) 75%, transparent 85%);
      animation-duration: 18s;
    }
    @keyframes waveRotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .grid-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-image: 
        linear-gradient(rgba(0,230,200,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,230,200,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 0;
    }

    .content { position: relative; z-index: 10; width: 100%; max-width: 400px; }

    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 6px;
    }
    .header i { font-size: 1.6rem; color: #00e6c8; }
    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      color: white;
      letter-spacing: 3px;
    }
    .subtitulo {
      text-align: center;
      font-size: 0.72rem;
      color: rgba(0,230,200,0.6);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    .zona-card {
      background: rgba(0,230,200,0.05);
      border: 1px solid rgba(0,230,200,0.2);
      border-radius: 14px;
      padding: 12px 20px;
      text-align: center;
      margin-bottom: 32px;
      backdrop-filter: blur(10px);
    }
    .zona-label {
      font-size: 0.65rem;
      color: rgba(0,230,200,0.7);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .zona-nombre { font-size: 1rem; font-weight: 600; color: white; }
    .zona-edificio { font-size: 0.8rem; color: rgba(255,255,255,0.4); margin-top: 2px; }

    .btn-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 280px;
      height: 280px;
      margin: 0 auto 32px;
    }

    .orbit {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(0,230,200,0.15);
      animation: orbitSpin 20s linear infinite;
    }
    .orbit::before {
      content: '';
      position: absolute;
      width: 6px;
      height: 6px;
      background: #00e6c8;
      border-radius: 50%;
      top: -3px;
      left: 50%;
      transform: translateX(-50%);
      box-shadow: 0 0 8px #00e6c8;
    }
    .orbit:nth-child(1) { width: 220px; height: 220px; animation-duration: 8s; }
    .orbit:nth-child(2) { width: 250px; height: 250px; animation-duration: 12s; animation-direction: reverse; }
    .orbit:nth-child(2)::before { background: #00ff88; box-shadow: 0 0 8px #00ff88; }
    .orbit:nth-child(3) { width: 278px; height: 278px; animation-duration: 16s; }
    .orbit:nth-child(3)::before { background: #00bfff; box-shadow: 0 0 8px #00bfff; }

    @keyframes orbitSpin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .pulse-ring {
      position: absolute;
      border-radius: 50%;
      background: transparent;
      border: 2px solid rgba(0,230,200,0.4);
      animation: pulseRing 2s ease-out infinite;
    }
    .pulse-ring:nth-child(4) { width: 180px; height: 180px; animation-delay: 0s; }
    .pulse-ring:nth-child(5) { width: 180px; height: 180px; animation-delay: 1s; }

    @keyframes pulseRing {
      0% { transform: scale(0.8); opacity: 1; }
      100% { transform: scale(1.3); opacity: 0; }
    }

    .btn-panico {
      position: relative;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: 2px solid rgba(0,230,200,0.5);
      background: linear-gradient(135deg, #003d35, #005544);
      color: #00e6c8;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 
        0 0 30px rgba(0,230,200,0.3),
        inset 0 0 30px rgba(0,230,200,0.05);
      transition: all 0.3s;
      z-index: 10;
    }
    .btn-panico i { font-size: 2.2rem; }
    .btn-panico:hover, .btn-panico:active {
      background: linear-gradient(135deg, #00e6c8, #00ff88);
      color: #020f1a;
      box-shadow: 0 0 60px rgba(0,230,200,0.7);
      transform: scale(1.05);
    }
    .btn-panico:disabled {
      background: linear-gradient(135deg, #1a3a3a, #1a2a2a);
      color: rgba(0,230,200,0.3);
      border-color: rgba(0,230,200,0.1);
      box-shadow: none;
      cursor: not-allowed;
      transform: none;
    }

    .estado {
      display: none;
      background: rgba(0,230,200,0.05);
      border: 1px solid rgba(0,230,200,0.2);
      border-radius: 14px;
      padding: 16px 20px;
      width: 100%;
      max-width: 400px;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.85);
      line-height: 1.8;
      backdrop-filter: blur(10px);
      margin: 0 auto;
    }
    .estado.activo { display: block; }
    .estado.error { display: block; color: #ff4d4d; }

    #btn-interrumpir {
      display: none;
      margin: 12px auto 0;
      background: transparent;
      border: 1px solid rgba(0,230,200,0.4);
      color: #00e6c8;
      padding: 8px 20px;
      border-radius: 10px;
      font-size: 0.8rem;
      cursor: pointer;
      letter-spacing: 1px;
    }

    .bubble {
      position: fixed;
      bottom: -100px;
      border-radius: 50%;
      background: rgba(0,230,200,0.08);
      border: 1px solid rgba(0,230,200,0.15);
      animation: bubbleUp linear infinite;
      z-index: 1;
    }
    @keyframes bubbleUp {
      0% { transform: translateY(0) scale(1); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 0.5; }
      100% { transform: translateY(-110vh) scale(1.2); opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="grid-bg"></div>
  <div class="bg-waves">
    <div class="wave"></div>
    <div class="wave"></div>
    <div class="wave"></div>
  </div>

  <div class="content">
    <div class="header">
      <i class='bx bx-shield-quarter'></i>
      <div class="logo">SAFEPASS</div>
    </div>
    <div class="subtitulo">ITCA-FEPADE · Santa Tecla</div>

    <div class="zona-card">
      <div class="zona-label">Ubicación actual</div>
      <div class="zona-nombre" id="zona-nombre">Cargando...</div>
      <div class="zona-edificio" id="zona-edificio"></div>
    </div>
  </div>

  <div class="btn-wrapper">
    <div class="orbit"></div>
    <div class="orbit"></div>
    <div class="orbit"></div>
    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>
    <button class="btn-panico" id="btn-panico" onclick="mostrarOpciones()">
      <i class='bx bx-alarm-exclamation'></i>
      EMERGENCIA
    </button>
  </div>

  <div style="width:100%; max-width:400px; position:relative; z-index:10;">
    <div class="estado" id="estado"></div>
    <button id="btn-interrumpir" onclick="interrumpir()">INTERRUMPIR</button>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const zonaId = params.get('zona') || 1;
    let datosEstudiante = {};
    let pasoActual = 0;

    const preguntas = [
      { key: 'nombre',     texto: '¿Cuál es tu nombre?' },
      { key: 'edad',       texto: '¿Cuántos años tenés?' },
      { key: 'genero',     texto: '¿Cuál es tu género? Decí masculino o femenino.' },
      { key: 'emergencia', texto: '¿Qué pasó? Describilo brevemente.' }
    ];

    const textos = {
      noEscuche:   'No te escuché, por favor repetí.',
      procesando:  'Procesando emergencia...',
      consultando: 'Un momento, estoy consultando cómo ayudarte.',
      enCamino:    'El personal médico ya viene en camino. Si necesitás más ayuda, decí Enfermera.',
      masAyuda:    'Si necesitás más ayuda, decí Enfermera.',
      estaAqui:    'Estoy aquí, contame qué pasó.',
      bienvenida:  'Hola, soy SafePass, voy a ayudarte. Por favor respondé mis preguntas.'
    };

    fetch(`/api/zonas/${zonaId}`)
      .then(r => r.json())
      .then(zona => {
        document.getElementById('zona-nombre').textContent = zona.nombre_zona;
        document.getElementById('zona-edificio').textContent = zona.edificio;
      })
      .catch(() => {
        document.getElementById('zona-nombre').textContent = 'Zona no encontrada';
      });

    function hablar(texto, callback) {
      const synth = window.speechSynthesis;
      synth.cancel();
      const hacerHablar = () => {
        const utterance = new SpeechSynthesisUtterance(texto);
        utterance.lang = 'es-GT';
        utterance.rate = 1.5;
        const voces = synth.getVoices();
        const voz = voces.find(v => v.name === 'Microsoft Pablo - Spanish (Spain)') ||
                    voces.find(v => v.lang.startsWith('es'));
        if (voz) utterance.voice = voz;
        if (callback) utterance.onend = callback;
        synth.speak(utterance);
      };
      speechSynthesis.getVoices().length > 0 ? hacerHablar() : (speechSynthesis.onvoiceschanged = hacerHablar);
    }

    function escuchar(callback) {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      const recognition = new SpeechRecognition();
      recognition.lang = 'es-GT';
      recognition.continuous = false;
      recognition.interimResults = false;
      recognition.maxAlternatives = 3;
      recognition.start();

      recognition.onresult = (e) => {
        const texto = e.results[0][0].transcript;
        console.log('Escuché:', texto);
        callback(texto);
      };

      recognition.onspeechend = () => recognition.stop();

      recognition.onerror = (e) => {
        console.log('Error micrófono:', e.error);
        if (e.error === 'no-speech') {
          hablar(textos.noEscuche, () => escuchar(callback));
        } else if (e.error === 'aborted') {
          setTimeout(() => escuchar(callback), 500);
        } else {
          setTimeout(() => escuchar(callback), 1000);
        }
      };
    }

    function escucharPalabraClave() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      const recognition = new SpeechRecognition();
      recognition.lang = 'es-GT';
      recognition.continuous = false;
      recognition.interimResults = false;
      recognition.start();

      recognition.onresult = async (e) => {
        const texto = e.results[0][0].transcript.toLowerCase();
        console.log('Detecté:', texto);

        const palabrasClave = ['enfermera', 'enfermero', 'ayuda', 'socorro'];
        if (palabrasClave.some(p => texto.includes(p))) {
          hablar(textos.estaAqui, () => {
            escuchar(async (consulta) => {
              const estado = document.getElementById('estado');
              estado.innerHTML = `<div style="color:rgba(0,230,200,0.6); font-size:0.8rem">${textos.procesando}</div>`;
              const res = await fetch('/api/asistente/primeros-auxilios', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  nombre: datosEstudiante.nombre,
                  edad: datosEstudiante.edad,
                  genero: datosEstudiante.genero,
                  emergencia: datosEstudiante.emergencia + '. Consulta adicional: ' + consulta,
                  idioma: 'es'
                })
              });
              const data = await res.json();
              estado.innerHTML = `<div style="padding:8px 0; line-height:1.8">${data.respuesta}</div>`;
              hablar(data.respuesta, () => {
                hablar(textos.masAyuda, () => escucharPalabraClave());
              });
            });
          });
        } else {
          escucharPalabraClave();
        }
      };

      recognition.onerror = (e) => {
        console.log('Error palabra clave:', e.error);
        setTimeout(escucharPalabraClave, 1500);
      };
    }

    function interrumpir() {
      window.speechSynthesis.cancel();
      hablar('Dime, te escucho.', () => escucharPalabraClave());
    }

    function iniciarEmergencia() {
      document.getElementById('modal-opciones').style.display = 'none';
      const estado = document.getElementById('estado');
      estado.className = 'estado activo';
      pasoActual = 0;
      datosEstudiante = {};
      hablar(textos.bienvenida, siguientePregunta);
    }

    function siguientePregunta() {
      if (pasoActual >= preguntas.length) {
        procesarEmergencia();
        return;
      }
      const pregunta = preguntas[pasoActual];
      const estado = document.getElementById('estado');
      estado.className = 'estado activo';
      estado.innerHTML = `<span style="color:rgba(0,230,200,0.7); font-size:0.75rem; letter-spacing:1px">${pregunta.texto}</span>`;

      hablar(pregunta.texto, () => {
        escuchar((respuesta) => {
          datosEstudiante[pregunta.key] = respuesta;
          estado.innerHTML += `<div style="margin-top:8px; padding:10px; background:rgba(0,230,200,0.05); border-radius:10px; border-left:3px solid #00e6c8;">
            <span style="font-size:0.7rem; color:rgba(0,230,200,0.6)">Escuché:</span><br>
            <strong style="color:white">${respuesta}</strong>
          </div>`;
          pasoActual++;
          setTimeout(siguientePregunta, 800);
        });
      });
    }

    async function procesarEmergencia() {
      const estado = document.getElementById('estado');
      estado.innerHTML = `<div style="color:rgba(0,230,200,0.6)">${textos.procesando}</div>`;
      hablar(textos.consultando, null);

      await fetch('/api/alertas', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          id_zona: zonaId,
          nombre_estudiante: datosEstudiante.nombre,
          genero: datosEstudiante.genero,
          edad: datosEstudiante.edad,
          tipo_emergencia: datosEstudiante.emergencia
        })
      });

      const res = await fetch('/api/asistente/primeros-auxilios', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ...datosEstudiante, idioma: 'es' })
      });

      const data = await res.json();
      estado.innerHTML = `<div style="padding:8px 0; line-height:1.8">${data.respuesta}</div>`;
      document.getElementById('btn-interrumpir').style.display = 'block';
      hablar(data.respuesta, () => {
        hablar(textos.enCamino, () => escucharPalabraClave());
      });
    }

    function crearBurbuja() {
      const burbuja = document.createElement('div');
      burbuja.classList.add('bubble');
      const size = Math.random() * 40 + 10;
      burbuja.style.width = size + 'px';
      burbuja.style.height = size + 'px';
      burbuja.style.left = Math.random() * 100 + 'vw';
      burbuja.style.animationDuration = (Math.random() * 8 + 6) + 's';
      burbuja.style.animationDelay = (Math.random() * 3) + 's';
      document.body.appendChild(burbuja);
      setTimeout(() => burbuja.remove(), 14000);
    }
    setInterval(crearBurbuja, 800);

    function mostrarOpciones() {
      document.getElementById('btn-panico').disabled = true;
      document.getElementById('modal-opciones').style.display = 'flex';
    }

    function iniciarEscritura() {
      document.getElementById('modal-opciones').style.display = 'none';
      document.getElementById('modal-escritura').style.display = 'flex';
    }

    async function enviarFormulario() {
      const nombre = document.getElementById('txt-nombre').value;
      const edad = document.getElementById('txt-edad').value;
      const genero = document.getElementById('txt-genero').value;
      const emergencia = document.getElementById('txt-emergencia').value;

      if (!nombre || !edad || !genero || !emergencia) {
        alert('Por favor completá todos los campos');
        return;
      }

      datosEstudiante = { nombre, edad, genero, emergencia };
      document.getElementById('modal-escritura').style.display = 'none';

      const estado = document.getElementById('estado');
      estado.className = 'estado activo';
      estado.innerHTML = `<div style="color:rgba(0,230,200,0.6)">${textos.procesando}</div>`;

      await fetch('/api/alertas', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          id_zona: zonaId,
          nombre_estudiante: nombre,
          genero,
          edad,
          tipo_emergencia: emergencia
        })
      });

      const res = await fetch('/api/asistente/primeros-auxilios', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ...datosEstudiante, idioma: 'es' })
      });

      const data = await res.json();
      estado.innerHTML = `<div style="padding:8px 0; line-height:1.8">${data.respuesta}</div>`;
      document.getElementById('btn-interrumpir').style.display = 'block';
      hablar(data.respuesta, () => {
        hablar(textos.enCamino, () => escucharPalabraClave());
      });
    }
  </script>

<!-- Modal opciones -->
<div id="modal-opciones" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:200; align-items:center; justify-content:center;">
  <div style="background:#012c2e; border:1px solid rgba(0,230,200,0.3); border-radius:20px; padding:28px 24px; width:90%; max-width:340px; text-align:center;">
    <div style="font-size:0.7rem; color:rgba(0,230,200,0.6); letter-spacing:2px; text-transform:uppercase; margin-bottom:16px;">¿Cómo querés comunicarte?</div>
    <button onclick="iniciarEmergencia()" style="width:100%; padding:14px; background:linear-gradient(135deg,#00c8b0,#00e676); color:white; border:none; border-radius:12px; font-size:0.9rem; font-weight:700; cursor:pointer; margin-bottom:10px; display:flex; align-items:center; justify-content:center; gap:8px;">
      <i class='bx bx-microphone'></i> VOZ
    </button>
    <button onclick="iniciarEscritura()" style="width:100%; padding:14px; background:transparent; color:#00e6c8; border:2px solid rgba(0,230,200,0.4); border-radius:12px; font-size:0.9rem; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px;">
      <i class='bx bx-keyboard'></i> ESCRIBIR
    </button>
  </div>
</div>

<!-- Modal escritura -->
<div id="modal-escritura" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:200; align-items:flex-end; justify-content:center;">
  <div style="background:#012c2e; border:1px solid rgba(0,230,200,0.3); border-radius:20px 20px 0 0; padding:28px 24px 40px; width:100%; max-width:500px;">
    <div style="font-size:1rem; font-weight:700; color:white; margin-bottom:4px;">Formulario de Emergencia</div>
    <div style="font-size:0.75rem; color:rgba(0,230,200,0.6); margin-bottom:20px;">Completá los campos para activar la alerta</div>

    <div style="margin-bottom:12px;">
      <label style="font-size:0.7rem; color:rgba(0,230,200,0.7); letter-spacing:1px; text-transform:uppercase; display:block; margin-bottom:6px;">Nombre</label>
      <input id="txt-nombre" type="text" placeholder="Tu nombre completo" style="width:100%; padding:12px 14px; background:rgba(0,230,200,0.05); border:1px solid rgba(0,230,200,0.2); border-radius:10px; color:white; font-size:0.9rem; outline:none; font-family:'Segoe UI',sans-serif;">
    </div>

    <div style="margin-bottom:12px;">
      <label style="font-size:0.7rem; color:rgba(0,230,200,0.7); letter-spacing:1px; text-transform:uppercase; display:block; margin-bottom:6px;">Edad</label>
      <input id="txt-edad" type="number" placeholder="Tu edad" style="width:100%; padding:12px 14px; background:rgba(0,230,200,0.05); border:1px solid rgba(0,230,200,0.2); border-radius:10px; color:white; font-size:0.9rem; outline:none; font-family:'Segoe UI',sans-serif;">
    </div>

    <div style="margin-bottom:12px;">
      <label style="font-size:0.7rem; color:rgba(0,230,200,0.7); letter-spacing:1px; text-transform:uppercase; display:block; margin-bottom:6px;">Género</label>
      <select id="txt-genero" style="width:100%; padding:12px 14px; background:rgba(0,230,200,0.05); border:1px solid rgba(0,230,200,0.2); border-radius:10px; color:white; font-size:0.9rem; outline:none; font-family:'Segoe UI',sans-serif;">
        <option value="" style="background:#012c2e">Seleccioná</option>
        <option value="masculino" style="background:#012c2e">Masculino</option>
        <option value="femenino" style="background:#012c2e">Femenino</option>
        <option value="otro" style="background:#012c2e">Otro</option>
      </select>
    </div>

    <div style="margin-bottom:20px;">
      <label style="font-size:0.7rem; color:rgba(0,230,200,0.7); letter-spacing:1px; text-transform:uppercase; display:block; margin-bottom:6px;">¿Qué pasó?</label>
